<!DOCTYPE html>
<html lang="en" class="dark-theme">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 — Lost in the Multiverse | CineVerse</title>
<link rel="stylesheet" href="style.css?v=8.0"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Outfit:wght@800;900&display=swap" rel="stylesheet"/>
<style>
  body {
    background: #07070b;
    color: #e8e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .error-card {
    max-width: 540px;
    background: rgba(18, 18, 26, 0.8);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 24px;
    padding: 40px 30px;
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
  }
  .error-code {
    font-family: 'Outfit', sans-serif;
    font-size: 6rem;
    font-weight: 900;
    color: var(--accent, #e50914);
    line-height: 1;
    margin-bottom: 12px;
    text-shadow: 0 0 40px rgba(229, 9, 20, 0.4);
  }
  .error-title {
    font-family: 'Outfit', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    margin-bottom: 10px;
  }
  .error-desc {
    color: #8e8ea8;
    font-size: 0.95rem;
    line-height: 1.6;
    margin-bottom: 28px;
  }
  .btn-home {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #b20710, #e50914);
    color: #fff;
    padding: 12px 28px;
    border-radius: 50px;
    font-weight: 800;
    text-decoration: none;
    transition: all 0.3s;
  }
  .btn-home:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(229, 9, 20, 0.4);
  }
</style>
</head>
<body>
  <div class="error-card">
    <div class="error-code">404</div>
    <h1 class="error-title">Lost in the Multiverse</h1>
    <p class="error-desc">The cinematic page or timeline you're looking for doesn't exist or has moved to another dimension.</p>
    <a href="index.html" class="btn-home">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Return to CineVerse Home
    </a>
  </div>
</body>
</html>
