<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e1e2c"/>
      <stop offset="1" stop-color="#0c0c16"/>
    </linearGradient>
    <linearGradient id="arr" x1="14" y1="11" x2="29" y2="20" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff6035"/>
      <stop offset="1" stop-color="#e52010"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="40" height="40" rx="9"/>
    </clipPath>
  </defs>
  <g clip-path="url(#clip)">
    <!-- Background -->
    <rect width="40" height="40" fill="url(#bg)"/>
    <!-- Film-strip spine -->
    <rect x="0" y="0" width="11" height="40" fill="#ff4428" fill-opacity="0.14"/>
    <!-- Film perforations -->
    <rect x="2"  y="8"    width="7" height="5.5" rx="1.5" fill="#0c0c16"/>
    <rect x="2"  y="17"   width="7" height="5.5" rx="1.5" fill="#0c0c16"/>
    <rect x="2"  y="26.5" width="7" height="5.5" rx="1.5" fill="#0c0c16"/>
    <!-- Play arrow -->
    <path d="M14 11.5L14 28.5L29 20Z" fill="url(#arr)"/>
  </g>
</svg>
